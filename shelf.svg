<svg xmlns="http://www.w3.org/2000/svg" width="361" height="484" role="img" aria-label="My bookshelf">
  <defs>
    <linearGradient id="woodGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#EDD080"/>
      <stop offset="20%"  stop-color="#C8A050"/>
      <stop offset="100%" stop-color="#8A6228"/>
    </linearGradient>
    <radialGradient id="bgVignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#F4E8C1" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C8A870" stop-opacity="0.25"/>
    </radialGradient>
    <filter id="shelfShadow" x="-2%" y="-10%" width="104%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#3A2000" flood-opacity="0.22"/>
    </filter>
    <filter id="spineShadow" x="-10%" y="-2%" width="130%" height="104%">
      <feDropShadow dx="1" dy="0" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <style>
      @keyframes bookRise {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes readingPulse {
        0%, 100% { opacity: 0; }
        50%      { opacity: 0.55; }
      }
      .book {
        animation: bookRise 0.45s ease-out both;
      }
      .reading-glow {
        animation: readingPulse 2.8s ease-in-out infinite;
      }
    </style>
  </defs>
  <rect width="361" height="484" fill="#F4E8C1" rx="8" ry="8"/>
  <rect width="361" height="484" fill="url(#bgVignette)" rx="8" ry="8"/>
  <text x="180.5" y="38.0" text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-size="12" fill="#5C3D2D" letter-spacing="1.5"
    font-style="italic"
  >Currently Reading</text>
  <line x1="24.0" y1="46.0" x2="125.5" y2="46.0" stroke="#C4A265" stroke-width="0.8" opacity="0.5"/>
  <line x1="235.5" y1="46.0" x2="337.0" y2="46.0" stroke="#C4A265" stroke-width="0.8" opacity="0.5"/>
  <g class="book" filter="url(#spineShadow)" style="animation-delay:0.00s">
    <title>Designing Your Life — Bill Burnett &amp; Dave Evans (Self-help)</title>
    <rect x="20.0" y="60.0" width="44" height="160" fill="#1A5C3A" rx="2" ry="2"/>
    <rect x="21.0" y="60.0" width="42" height="3" fill="#EDE8DF" rx="1" opacity="0.75"/>
    <rect x="60.0" y="60.0" width="4" height="160" fill="#113E27" opacity="0.4" rx="0"/>
    <rect x="20.0" y="60.0" width="2" height="160" fill="#7AA08C" opacity="0.4" rx="0"/>
    <text
      transform="rotate(-90,42.0,140.0)"
      x="42.0" y="140.0"
      text-anchor="middle" dy="0.35em"
      font-family="Arial,Helvetica,sans-serif"
      font-size="10" font-weight="500"
      fill="white" opacity="0.92"
      pointer-events="none"
    >Designing Your Life</text>
    <rect class="reading-glow" x="20.0" y="60.0" width="44" height="160" fill="none" stroke="#E8C84A" stroke-width="2.5" rx="2"/>
  </g>
  <rect x="4.0" y="220.0" width="76.0" height="14" fill="url(#woodGrad)" rx="1" filter="url(#shelfShadow)"/>
  <rect x="4.0" y="220.0" width="76.0" height="2" fill="#F5E090" rx="1" opacity="0.45"/>
  <text x="180.5" y="266.0" text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-size="12" fill="#5C3D2D" letter-spacing="1.5"
    font-style="italic"
  >Read</text>
  <line x1="24.0" y1="274.0" x2="125.5" y2="274.0" stroke="#C4A265" stroke-width="0.8" opacity="0.5"/>
  <line x1="235.5" y1="274.0" x2="337.0" y2="274.0" stroke="#C4A265" stroke-width="0.8" opacity="0.5"/>
  <g class="book" filter="url(#spineShadow)" style="animation-delay:0.07s">
    <title>Let My People Go Surfing — Yvon Chouinard (Business)</title>
    <rect x="20.0" y="288.0" width="44" height="160" fill="#8B2515" rx="2" ry="2"/>
    <rect x="21.0" y="288.0" width="42" height="3" fill="#EDE8DF" rx="1" opacity="0.75"/>
    <rect x="60.0" y="288.0" width="4" height="160" fill="#5E190E" opacity="0.4" rx="0"/>
    <rect x="20.0" y="288.0" width="2" height="160" fill="#BB8077" opacity="0.4" rx="0"/>
    <text
      transform="rotate(-90,42.0,368.0)"
      x="42.0" y="368.0"
      text-anchor="middle" dy="0.35em"
      font-family="Arial,Helvetica,sans-serif"
      font-size="10" font-weight="500"
      fill="white" opacity="0.92"
      pointer-events="none"
    >Let My People Go Surfing</text>
  </g>
  <g class="book" filter="url(#spineShadow)" style="animation-delay:0.14s">
    <title>Weapons of Math Destruction — Cathy O'Neil (Technology)</title>
    <rect x="69.0" y="288.0" width="44" height="160" fill="#0D2A42" rx="2" ry="2"/>
    <rect x="70.0" y="288.0" width="42" height="3" fill="#EDE8DF" rx="1" opacity="0.75"/>
    <rect x="109.0" y="288.0" width="4" height="160" fill="#081C2C" opacity="0.4" rx="0"/>
    <rect x="69.0" y="288.0" width="2" height="160" fill="#728391" opacity="0.4" rx="0"/>
    <text
      transform="rotate(-90,91.0,368.0)"
      x="91.0" y="368.0"
      text-anchor="middle" dy="0.35em"
      font-family="Arial,Helvetica,sans-serif"
      font-size="10" font-weight="500"
      fill="white" opacity="0.92"
      pointer-events="none"
    >Weapons of Math Destruc…</text>
  </g>
  <g class="book" filter="url(#spineShadow)" style="animation-delay:0.21s">
    <title>The Age of Surveillance Capitalism — Shoshana Zuboff (Technology)</title>
    <rect x="118.0" y="288.0" width="44" height="160" fill="#0D2A42" rx="2" ry="2"/>
    <rect x="119.0" y="288.0" width="42" height="3" fill="#EDE8DF" rx="1" opacity="0.75"/>
    <rect x="158.0" y="288.0" width="4" height="160" fill="#081C2C" opacity="0.4" rx="0"/>
    <rect x="118.0" y="288.0" width="2" height="160" fill="#728391" opacity="0.4" rx="0"/>
    <text
      transform="rotate(-90,140.0,368.0)"
      x="140.0" y="368.0"
      text-anchor="middle" dy="0.35em"
      font-family="Arial,Helvetica,sans-serif"
      font-size="10" font-weight="500"
      fill="white" opacity="0.92"
      pointer-events="none"
    >The Age of Surveillance…</text>
  </g>
  <g class="book" filter="url(#spineShadow)" style="animation-delay:0.28s">
    <title>Either/Or — Soren Kierkegaard (Philosophy)</title>
    <rect x="167.0" y="288.0" width="44" height="160" fill="#3A1060" rx="2" ry="2"/>
    <rect x="168.0" y="288.0" width="42" height="3" fill="#EDE8DF" rx="1" opacity="0.75"/>
    <rect x="207.0" y="288.0" width="4" height="160" fill="#270A41" opacity="0.4" rx="0"/>
    <rect x="167.0" y="288.0" width="2" height="160" fill="#8C74A2" opacity="0.4" rx="0"/>
    <text
      transform="rotate(-90,189.0,368.0)"
      x="189.0" y="368.0"
      text-anchor="middle" dy="0.35em"
      font-family="Arial,Helvetica,sans-serif"
      font-size="12" font-weight="500"
      fill="white" opacity="0.92"
      pointer-events="none"
    >Either/Or</text>
  </g>
  <g class="book" filter="url(#spineShadow)" style="animation-delay:0.35s">
    <title>Meditations — Marcus Aurelius (Philosophy)</title>
    <rect x="216.0" y="288.0" width="44" height="160" fill="#3A1060" rx="2" ry="2"/>
    <rect x="217.0" y="288.0" width="42" height="3" fill="#EDE8DF" rx="1" opacity="0.75"/>
    <rect x="256.0" y="288.0" width="4" height="160" fill="#270A41" opacity="0.4" rx="0"/>
    <rect x="216.0" y="288.0" width="2" height="160" fill="#8C74A2" opacity="0.4" rx="0"/>
    <text
      transform="rotate(-90,238.0,368.0)"
      x="238.0" y="368.0"
      text-anchor="middle" dy="0.35em"
      font-family="Arial,Helvetica,sans-serif"
      font-size="12" font-weight="500"
      fill="white" opacity="0.92"
      pointer-events="none"
    >Meditations</text>
  </g>
  <g class="book" filter="url(#spineShadow)" style="animation-delay:0.42s">
    <title>The Lean Startup — Eric Ries (Business)</title>
    <rect x="265.0" y="288.0" width="44" height="160" fill="#8B2515" rx="2" ry="2"/>
    <rect x="266.0" y="288.0" width="42" height="3" fill="#EDE8DF" rx="1" opacity="0.75"/>
    <rect x="305.0" y="288.0" width="4" height="160" fill="#5E190E" opacity="0.4" rx="0"/>
    <rect x="265.0" y="288.0" width="2" height="160" fill="#BB8077" opacity="0.4" rx="0"/>
    <text
      transform="rotate(-90,287.0,368.0)"
      x="287.0" y="368.0"
      text-anchor="middle" dy="0.35em"
      font-family="Arial,Helvetica,sans-serif"
      font-size="11" font-weight="500"
      fill="white" opacity="0.92"
      pointer-events="none"
    >The Lean Startup</text>
  </g>
  <rect x="4.0" y="448.0" width="321.0" height="14" fill="url(#woodGrad)" rx="1" filter="url(#shelfShadow)"/>
  <rect x="4.0" y="448.0" width="321.0" height="2" fill="#F5E090" rx="1" opacity="0.45"/>
</svg>