# readsme — books configuration
# Copy this file to books.yaml and fill in your books.
# Run:  readsme generate
#
# status values: reading | read | want-to-read
# isbn is optional but enables cover art (Phase 2)

width: 800  # SVG width in pixels

# Optional: override default warm-palette colours per category
# categories:
#   Fantasy:
#     color: "#4A2040"
#   Science Fiction:
#     color: "#0F2A4A"

