name: Update bookshelf

on:
  push:
    branches: [main]
    paths:
      - books.yaml
      - .github/workflows/readsme.yml

jobs:
  update-shelf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install readsme
        run: pip install readsme

      - name: Generate bookshelf
        run: readsme generate --config books.yaml --output shelf.svg --readme README.md

      - name: Commit changes
        run: |
          git config user.name  "readsme[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shelf.svg README.md
          git diff --staged --quiet || git commit -m "chore: update bookshelf [skip ci]"
          git push
